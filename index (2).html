<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>デジタル時計 - 点滅アラーム付</title>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@800&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #ffffff;
            font-family: 'M PLUS Rounded 1c', sans-serif;
            overflow: hidden;
        }

        .controls {
            position: absolute;
            top: 20px;
            z-index: 10;
            background: rgba(255, 255, 255, 0.9);
            padding: 10px 20px;
            border-radius: 30px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            font-size: 14px;
        }

        input[type="time"] {
            font-family: inherit;
            font-size: 1rem;
            border: 2px solid #00AAFF;
            border-radius: 5px;
            padding: 3px;
            margin-left: 10px;
        }

        .clock-container {
            text-align: center;
            width: 100%;
            cursor: pointer;
        }

        #time {
            font-size: 18vw; 
            color: #00AAFF;
            line-height: 1;
            margin: 0;
            white-space: nowrap;
            letter-spacing: -0.02em;
            font-weight: 800;
        }

        #date {
            font-size: 4vw;
            color: #333333;
            margin-top: 10px;
        }

        /* 2回光って休むアニメーション */
        @keyframes double-flash {
            0%, 10%, 25%, 35% { background-color: #00AAFF; } /* 光る瞬間 */
            5%, 20%, 40%, 100% { background-color: #ffffff; } /* 白に戻る/休み */
        }

        .flashing {
            /* 1.5秒周期でアニメーションを繰り返す */
            animation: double-flash 1.5s infinite;
        }
    </style>
</head>
<body onclick="stopAlarm()">

    <div class="controls">
        アラーム設定 <input type="time" id="alarmTime">
    </div>

    <div class="clock-container">
        <div id="time">0:00:00</div>
        <div id="date">2026/0/0 (曜)</div>
    </div>

    <script>
        let alarmTriggered = false;

        function updateClock() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            const currentTime = `${h}:${m}`;
            
            document.getElementById('time').textContent = `${now.getHours()}:${m}:${s}`;

            const year = now.getFullYear();
            const month = now.getMonth() + 1;
            const day = now.getDate();
            const weekDays = ["日", "月", "火", "水", "木", "金", "土"];
            document.getElementById('date').textContent = `${year}/${month}/${day} (${weekDays[now.getDay()]})`;

            // アラーム判定
            const setAlarm = document.getElementById('alarmTime').value;
            if (setAlarm === currentTime && !alarmTriggered) {
                startAlarm();
            }
        }

        function startAlarm() {
            alarmTriggered = true;
            document.body.classList.add('flashing');
        }

        function stopAlarm() {
            if (alarmTriggered) {
                document.body.classList.remove('flashing');
            }
        }

        // 時間を変更したらリセット（再度鳴るようにする）
        document.getElementById('alarmTime').addEventListener('change', () => {
            alarmTriggered = false;
        });

        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
